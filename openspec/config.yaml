schema: spec-driven

context: |
  # プロジェクト: champ-edge-mobile

  ## 概要
  ポケモン Champions（Switch 2 / 今後リリースされるスマホ版）向けの対戦補助アプリ。
  現行デスクトップ版 champ-edge（Python / tkinter）の Phase 1 (MVP) 機能を
  iOS / Android 両対応のクロスプラットフォームアプリへ移植する。

  ## 現在のスコープ: Phase 1 (MVP) のみ
  - ポケモン / 技 / 特性 / 持ち物のデータ参照
  - ダメージ計算エンジン（テラスタル・特殊技仕様含む）
  - 基本情報・わざ情報・性格・努力値・実数値・ランク・壁・状態異常の手動入力
  - パーティ編集・保存（複数パーティ管理）
  - HOME 使用率の表示・反映
  - 天候・フィールドの設定
  - 画像認識（OCR）: 相手パーティ 6 体・自分の選出・相手 TN・レートを読み取る
  - スクリーンショット自動取込 UX（スクショ撮影 → アプリ復帰で自動解析）
  - 認識失敗スロットは手動修正可能
  - 招待制ユーザ認証とクラウド同期基盤

  ## 明示的アウトオブスコープ（Phase 2 以降または恒久対象外）
  - 対戦記録の登録・編集・分析（Phase 2）
  - 素早さ比較、重さ比較、加算ツール、タイマー、カウンタ（Phase 3）
  - データ CSV エクスポート、ダブルバトル対応、データ移行ツール（Phase 4）
  - OBS WebSocket 連携（モバイル版では恒久的に対象外）
  - Selenium クライアント側スクレイピング（サーバー側に集約）
  - Tesseract / manga-ocr 本体の同梱（OS ネイティブ OCR またはクラウド OCR に置換）
  - 配信モード（再検討）

  ## プラットフォーム要件
  - 対応 OS: iOS / Android 両対応
  - 実装方針: クロスプラットフォームフレームワーク（Flutter / React Native / KMP+Compose Multiplatform 等）
  - **具体的な技術選定は OpenSpec の change として意思決定する（未確定）**
  - 画面方向: 横画面（ランドスケープ）基本。スマホ版ゲームが横画面想定のため
  - 対応端末: スマートフォン優先、タブレットも横画面で快適に
  - オフライン動作: ダメージ計算・パーティ閲覧・対戦記録登録はオフライン可

  ## データ・バックエンド方針
  - **クラウド正本 + 端末キャッシュ + 招待制**
  - ユーザ独自データ（パーティ等）もクラウドを Source of Truth として保持
  - 対戦中の参照はすべて端末キャッシュ、オフライン完全動作を保証
  - 書き込みはオフラインキューイング、オンライン復帰で同期
  - 招待コードによるアカウント登録

  ## 既存資産（旧リポジトリ ~/Documents/champ-edge）
  ロジック仕様と DB スキーマの**参照元**として扱い、実装は移植先言語で再実装する。

  ### コードロジック参照（旧リポを参照）
  - `~/Documents/champ-edge/pokedata/calc.py`: ダメージ計算ロジック（最重要）
  - `~/Documents/champ-edge/pokedata/pokemon.py`: ポケモンデータモデル
  - `~/Documents/champ-edge/pokedata/waza.py`: 技仕様
  - `~/Documents/champ-edge/pokedata/nature.py`: 性格
  - `~/Documents/champ-edge/pokedata/stats.py`: ステータス計算
  - `~/Documents/champ-edge/pokedata/const.py`: 定数
  - `~/Documents/champ-edge/database/battle.py`: 対戦記録 DB スキーマ
  - `~/Documents/champ-edge/mypgl/analytics.py`: 集計ロジック（Phase 2 で参照）
  - `~/Documents/champ-edge/recog/capture.py`: 画面認識フローの参考
  - `~/Documents/champ-edge/party/image_parser.py`: 画像解析ロジックの参考

  ### コピー済みアセット（このリポジトリ内）
  - `assets/image/`: ポケモン画像 / タイプアイコン / メニューアイコン / その他 UI 素材
  - `assets/data/pokemon.db`: ポケモン / 技 / 特性 / 持ち物マスタデータ（SQLite）
  - `assets/data/stats/`: HOME 使用率データ（home_*.csv, ranking.json 等）

  ## 非機能要件（Phase 1 関連抜粋）
  - ダメージ計算は入力変更から 100ms 以内に再表示
  - スクショ取込から OCR 結果表示まで 3 秒以内を目標
  - 通信不能時もコア機能（計算・パーティ閲覧）が機能する
  - HTTPS + 認証トークン、招待制
  - 個人情報（TN 等）の取り扱いに関するプライバシーポリシー整備

  ## 制約・前提
  - 開発リソース限定、Phase 1 完了をスマホ版ゲームリリースに合わせる
  - ポケモン関連の画像・データの取り扱いは個人利用範囲を逸脱しない
  - 商標・著作権に配慮した素材選定
  - 非公開（private）リポジトリで開発

  ## 技術選定で決定が必要な論点（changes 候補）
  これらは個別の change として `/opsx:propose` で意思決定する:
  1. クロスプラットフォーム技術選定（Flutter / RN / KMP）
  2. ダメージ計算エンジンの実装言語と共有方式（再実装 / Rust 等共通化 / サーバー API）
  3. モバイル横画面 UI/UX 設計方針
  4. 画像認識の実装方式（オンデバイス OS ネイティブ OCR / クラウド OCR）
  5. スクショ自動取込の OS 別実装と権限ハンドリング
  6. バックエンドアーキテクチャ（サーバーレス / コンテナ）
  7. 招待制の実装方式
  8. オフラインキューと同期競合解決方針
  9. テスト戦略（計算スナップショット / UI / E2E / OCR 精度評価）
  10. リリース戦略（ベータ配布 / 段階リリース / 既存版併存）

  ## 関連リソース
  - 要件定義: champ-edge#25 イシュー
  - 旧リポ README: ~/Documents/champ-edge/README.md（全機能仕様の正）
  - AI-DLC 参考: https://qiita.com/Nana_777/items/aff2e56e4248cee1114e

rules:
  proposal:
    - Phase 1 (MVP) スコープ内であることを必ず確認する。Phase 2 以降の機能は明示的にスコープ外と記載
    - 既存資産（pokedata/* など）を参照する場合は具体的ファイルパスを記載
    - 技術選定が未確定の論点は「decide-* 系 change で別途意思決定」と明記
    - 横画面（ランドスケープ）UI 前提であることを必要に応じて明示
    - オフライン動作要件（該当機能のみ）を明示
  specs:
    - 要件は Given/When/Then (BDD) 形式で記述する
    - ダメージ計算系の要件には旧 calc.py の該当箇所への参照を添える
    - オフライン時の挙動 / オンライン復帰時の挙動を分けて記述
    - iOS / Android 双方で差異がある場合は各 OS の挙動を明示
    - エラーケース（OCR 失敗、ネット断、認証エラー等）の期待挙動を必ず記載
  design:
    - クロスプラットフォーム実装上のトレードオフ（共有可能な部分、OS 個別実装の必要性）を記載
    - パフォーマンス目標（計算 100ms 以内、OCR 3 秒以内等）への達成方針を含める
    - 既存ロジックからの移植方針（直訳 / リファクタ / 共通モジュール化）を明記
  tasks:
    - 各タスクは iOS / Android / 共通 / バックエンド のいずれに該当するか分類
    - テストケースタスクを必ず含める（特にダメージ計算）
    - 旧コードを参照する場合はファイルパス + 行範囲を明記
