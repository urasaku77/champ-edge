name: Build and Release

run-name: Build and Release

on:
  push:
    branches: [main]
    paths: ['version.txt']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get version
        id: get_version
        shell: bash
        run: |
          VER="$(cat version.txt | tr -d '[:space:]')"
          echo "VERSION=$VER" >> $GITHUB_OUTPUT
          echo "## Build version: v$VER" >> $GITHUB_STEP_SUMMARY

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        shell: pwsh
        run: |
          $deps = Get-Content requirements.lock |
            Where-Object { $_ -notmatch "^-e\s" -and $_ -notmatch "^#" -and $_.Trim() -ne "" }
          $deps | Out-File -FilePath requirements_ci.txt -Encoding utf8
          pip install -r requirements_ci.txt
          pip install pyinstaller==6.7.0

      - name: Inject update token
        shell: bash
        env:
          CHAMPEDGE_GH_TOKEN: ${{ secrets.UPDATE_PAT }}
        run: |
          printf 'EMBEDDED_TOKEN = %s\n' "\"$CHAMPEDGE_GH_TOKEN\"" > component/_token.py

      - name: Build with PyInstaller
        run: python -m PyInstaller champedge.spec --noconfirm

      - name: README PDF確認（フォールバック生成）
        shell: bash
        run: |
          if [ -f README.pdf ]; then
            echo "README.pdf が存在します（スキップ）"
          else
            echo "README.pdf が見つからないため生成します"
            npm install -g md-to-pdf
            md-to-pdf README.md || exit 1
          fi
          ls -la README.pdf

      - name: Create zips
        shell: pwsh
        run: |
          python scripts/create_update_zip.py --full
          python scripts/create_update_zip.py
          Move-Item -Force dist/champedge_full.zip   champedge_forwin.zip
          Move-Item -Force dist/champedge_update.zip champedge_forwin_update.zip

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          ver="${{ steps.get_version.outputs.VERSION }}"
          echo "Version: $ver"

          # 前のタグを取得してコミット一覧を生成（HEADから到達できる直近タグを使用）
          prev_tag=$(git describe --tags --match "v*" --abbrev=0 HEAD^ 2>/dev/null || true)
          if [ -n "$prev_tag" ]; then
            commit_log=$(git log "${prev_tag}..HEAD" --pretty=format:"- %s" --no-merges || true)
            notes="$(printf '## 変更点 (%s -> v%s)\n%s' "$prev_tag" "$ver" "$commit_log")"
          else
            commit_log=$(git log --pretty=format:"- %s" --no-merges || true)
            notes="$(printf '## 変更点\n%s' "$commit_log")"
          fi

          echo "=== delete and recreate release ==="
          gh release delete "v$ver" --repo ${{ github.repository }} --yes 2>/dev/null || echo "(no existing release)"
          gh release create "v$ver" \
            --repo ${{ github.repository }} \
            --title "v$ver" \
            --notes "$notes"
          echo "=== uploading ==="
          gh release upload "v$ver" champedge_forwin.zip champedge_forwin_update.zip \
            --repo ${{ github.repository }}

  build-mac:
    runs-on: macos-latest
    needs: build-windows

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get version
        id: get_version
        run: |
          VER="$(cat version.txt | tr -d '[:space:]')"
          echo "VERSION=$VER" >> $GITHUB_OUTPUT

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          grep -v "^-e\|^#\|^$" requirements.lock > requirements_ci.txt
          pip install -r requirements_ci.txt
          pip install pyinstaller==6.7.0

      - name: Inject update token
        env:
          CHAMPEDGE_GH_TOKEN: ${{ secrets.UPDATE_PAT }}
        run: |
          printf 'EMBEDDED_TOKEN = %s\n' "\"$CHAMPEDGE_GH_TOKEN\"" > component/_token.py

      - name: Build with PyInstaller
        run: python -m PyInstaller champedge.spec --noconfirm

      - name: Create zips
        run: |
          python scripts/create_update_zip.py --full
          python scripts/create_update_zip.py
          mv dist/champedge_full.zip champedge_formac.zip
          mv dist/champedge_update.zip champedge_formac_update.zip

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ver="${{ steps.get_version.outputs.VERSION }}"
          gh release upload "v$ver" champedge_formac.zip champedge_formac_update.zip \
            --repo ${{ github.repository }}
          echo "=== release assets ==="
          gh release view "v$ver" --repo ${{ github.repository }} --json assets --jq '.assets[] | "\(.name)  \(.size) bytes"'
