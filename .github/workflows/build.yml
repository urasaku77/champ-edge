name: Build and Release

on:
  push:
    branches:
      - main
    paths:
      - 'version.txt'
  workflow_dispatch:
    inputs:
      version:
        description: 'ビルドするバージョン (例: 1.0.1)'
        required: false
        default: ''

run-name: "Build v${{ inputs.version || github.event.head_commit.message }}"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        shell: bash
        run: |
          VER="$(cat version.txt | tr -d '[:space:]')"
          echo "VERSION=$VER" >> $GITHUB_OUTPUT
          echo "Version: $VER"

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        shell: pwsh
        run: |
          $deps = Get-Content requirements.lock |
            Where-Object { $_ -notmatch "^-e\s" -and $_ -notmatch "^#" -and $_.Trim() -ne "" }
          $deps | Out-File -FilePath requirements_ci.txt -Encoding utf8
          pip install -r requirements_ci.txt

      - name: Build with PyInstaller
        run: python -m PyInstaller champedge.spec --noconfirm

      - name: Create zips
        shell: pwsh
        run: |
          python scripts/create_update_zip.py --full
          python scripts/create_update_zip.py
          Move-Item -Force dist/champedge_full.zip   champedge_forwin.zip
          Move-Item -Force dist/champedge_update.zip champedge_forwin_update.zip

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          ver="${{ steps.get_version.outputs.VERSION }}"
          echo "Version: $ver"
          echo "=== release state before ==="
          gh release view "v$ver" --repo ${{ github.repository }} --json isDraft,tagName,assets 2>&1 || echo "(release not found)"
          echo "=== delete and recreate release ==="
          gh release delete "v$ver" --repo ${{ github.repository }} --yes 2>/dev/null || echo "(no existing release)"
          gh release create "v$ver" \
            --repo ${{ github.repository }} \
            --title "v$ver" \
            --notes "バージョン $ver のリリース"
          echo "=== zip files ==="
          ls -lh champedge_forwin.zip champedge_forwin_update.zip
          echo "=== uploading ==="
          gh release upload "v$ver" champedge_forwin.zip champedge_forwin_update.zip \
            --repo ${{ github.repository }}
          echo "=== release assets after upload ==="
          gh release view "v$ver" --repo ${{ github.repository }} --json assets --jq '.assets[] | "\(.name)  \(.size) bytes"'
